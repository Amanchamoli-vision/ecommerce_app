name: clothes_ecommerce
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.1.0

  # Utilities
  shared_preferences: ^2.2.3
  random_string: ^2.3.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  google_fonts: ^6.1.0

  # UI
  curved_navigation_bar: ^1.0.6

  # Payment
  razorpay_flutter: ^1.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - images/

  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-SemiBold.ttf