name: clothes_ecommerce
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0-210.2.beta

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.1.1       # Stable version use karein
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.1.0   # Image upload ke liye zaroori
  shared_preferences: ^2.2.3
  random_string: ^2.3.1
  image_picker: ^1.1.2
  curved_navigation_bar: ^1.0.6
  razorpay_flutter: ^1.3.5   # Iske baad 'flutter pub get' zaroori hai
  intl: ^0.19.0   
  google_fonts: ^6.1.0  
 
           # Date aur Currency format ke liye (Add karein)



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - images/

  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-SemiBold.ttf